<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <linearGradient id="natsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00" />
      <stop offset="100%" stop-color="#D95100" />
    </linearGradient>
    <linearGradient id="accentGradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A66C2" />
      <stop offset="100%" stop-color="#0084FF" />
    </linearGradient>
  </defs>
  
  <!-- Background Card -->
  <rect width="400" height="120" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  
  <!-- Left Icon Emblem -->
  <g transform="translate(15, 15)">
    <!-- Outer Ring -->
    <circle cx="45" cy="45" r="40" fill="url(#natsGrad)" />
    <circle cx="45" cy="45" r="35" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="5 3" />
    
    <!-- Shield / Education Badge -->
    <path d="M 45 25 L 61 31 L 61 47 C 61 58, 45 66, 45 66 C 45 66, 29 58, 29 47 L 29 31 Z" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linejoin="round" />
    <path d="M 45 25 L 61 31 L 61 47 C 61 58, 45 66, 45 66 C 45 66, 29 58, 29 47 L 29 31 Z" fill="url(#accentGradBlue)" opacity="0.85" />
    
    <!-- Open Book Icon inside Shield -->
    <path d="M 45 52 L 40 49 L 34 51 L 34 38 L 40 37 L 45 39 M 45 52 L 50 49 L 56 51 L 56 38 L 50 37 L 45 39" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Text Elements -->
  <g transform="translate(115, 0)">
    <text x="0" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#FF7A00" letter-spacing="1">NATS</text>
    <rect x="0" y="52" width="70" height="4" rx="2" fill="url(#accentGradBlue)" />
    <text x="0" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1E293B">National Apprenticeship</text>
    <text x="0" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#64748B" letter-spacing="0.5">Training Scheme</text>
  </g>
  
  <!-- Gov of India indicator badge -->
  <g transform="translate(310, 15)">
    <rect width="75" height="18" rx="9" fill="#F1F5F9" />
    <text x="37.5" y="13" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="800" fill="#475569" text-anchor="middle" letter-spacing="0.5">GOVT. OF INDIA</text>
  </g>
</svg>
